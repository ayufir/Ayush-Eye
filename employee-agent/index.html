<!DOCTYPE html>
<html>
<head>
    <title>Sentinel Agent</title>
    <style>
        body {
            margin: 0;
            background: #0f172a;
            color: #94a3b8;
            font-family: monospace;
            padding: 20px;
            font-size: 13px;
        }
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ef4444;
            animation: pulse 2s infinite;
        }
        .dot.connected { background: #10b981; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        h3 { color: #3b82f6; margin: 0 0 16px; font-size: 16px; }
        .log { background: #1e293b; padding: 12px; border-radius: 8px; font-size: 11px; max-height: 120px; overflow-y: auto; }
        .log p { margin: 2px 0; color: #64748b; }
        .log p.ok { color: #10b981; }
        .log p.err { color: #ef4444; }
    </style>
</head>
<body>
    <h3>🛡️ Sentinel Agent</h3>
    <div class="status">
        <div class="dot" id="dot"></div>
        <span id="statusText">Connecting to server...</span>
    </div>
    <div class="log" id="log"></div>

    <script src="renderer.js"></script>
</body>
</html>
